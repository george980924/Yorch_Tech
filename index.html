<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>COMPONENTES ELECTRÓNICOS HOLGUÍN</title>
<style>
body{
    font-family:Arial;
    margin:0;
    background:#f2f2f2;
}
header{
    text-align:center;
    position:relative;
}
.buscar{
    text-align:center;
    padding:25px;
}
.buscar input{
    width:80%;
    padding:10px;
    border:2px solid orange;
    border-radius:6px;
}
.categorias{
    text-align:center;
}
.categorias button{
    padding:10px 15px;
    margin:5px;
    border:none;
    background:#ff9800;
    color:white;
    border-radius:20px;
    cursor:pointer;
}
.productos{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
    gap:15px;
    padding:15px;
}
.producto{
    background:white;
    border-radius:10px;
    padding:10px;
    text-align:center;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}
.producto img{
    width:100%;
    height:250px;
    object-fit:cover;
}
.precio{
    color:green;
    font-weight:bold;
}
.btn{
    background:#25D366;
    color:white;
    padding:8px;
    border-radius:6px;
    border:none;
    cursor:pointer;
    margin:2px 0;
}
.titulo{
    font-size:45px;
    color:black;
    font-weight:bold;
    margin-top:5px;
    text-shadow:2px 2px 5px white;
}
.whatsapp{
    position:fixed;
    bottom:20px;
    right:20px;
    background:#25D366;
    color:white;
    font-size:28px;
    width:60px;
    height:60px;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    text-decoration:none;
}
.whatsapp:hover{
    transform:scale(1.1);
    transition:0.2s;
}
.carrito-icono{
    position:fixed;
    bottom:90px;
    right:20px;
    background:black;
    color:white;
    padding:10px 15px;
    border-radius:20px;
    cursor:pointer;
}
.carrito-panel{
    position:fixed;
    right:20px;
    bottom:140px;
    width:300px;
    max-height:400px;
    overflow-y:auto;
    background:white;
    padding:15px;
    border-radius:10px;
    box-shadow:0 0 15px rgba(0,0,0,0.3);
    display:none;
    z-index:1000;
}
.carrito-panel button{
    width:100%;
    padding:8px;
    background:orange;
    border:none;
    border-radius:6px;
    margin-top:10px;
}
.cantidad-btn{
    padding:2px 6px;
    margin:0 3px;
    cursor:pointer;
    background:#ff9800;
    color:white;
    border:none;
    border-radius:4px;
}
.eliminar-btn{
    padding:2px 6px;
    cursor:pointer;
    background:red;
    color:white;
    border:none;
    border-radius:4px;
}
</style>
</head>
<body>

<header>
<img src="banner.png?v=2" style="width:100%; height:200px; object-fit:cover;">
<div style="position:absolute; top:40px; left:50%; transform:translateX(-50%); text-align:center;">
<img src="logo.png?v=2" width="120">
<h1 class="titulo">YORCH TECH</h1>
</div>
</header>

<div class="buscar">
<input id="buscar" placeholder="Buscar producto">
</div>

<div class="categorias">
<button onclick="filtrar('todos')">Todos</button>
<button onclick="filtrar('BMS')">BMS</button>
<button onclick="filtrar('OTROS')">OTROS</button>
</div>

<div class="productos" id="productos"></div>

<!-- ICONO DEL CARRITO -->
<div class="carrito-icono" onclick="toggleCarrito()">
🛒 <span id="contador">0</span>
</div>

<!-- PANEL DEL CARRITO -->
<div class="carrito-panel" id="carritoPanel">
<h3>🛒 Tu carrito</h3>

<!-- Datos del cliente dentro del panel -->
<div style="margin-bottom:10px;">
<input id="nombre" placeholder="Nombre" style="width:100%;padding:6px;margin:2px;">
<input id="telefonoCliente" placeholder="Teléfono" style="width:100%;padding:6px;margin:2px;">
<input id="direccion" placeholder="Dirección" style="width:100%;padding:6px;margin:2px;">
<input id="referencia" placeholder="Punto de referencia" style="width:100%;padding:6px;margin:2px;">
<input id="ubicacion" placeholder="Ubicación" style="width:100%;padding:6px;margin:2px;">
</div>

<div id="listaCarrito"></div>
<p><strong>Total: $<span id="total">0</span></strong></p>
<button onclick="enviarPedido()">Finalizar pedido</button>
</div>

<script src="productos.js"></script>
<script>
let telefono="5358103725";
let carrito=[];

function actualizarContador(){
    document.getElementById("contador").innerText = carrito.length;
}

function mostrarCarrito(){
    let lista = document.getElementById("listaCarrito");
    let totalHTML = document.getElementById("total");
    lista.innerHTML = "";
    let total = 0;
    carrito.forEach((p,index)=>{
        lista.innerHTML += `
        <p>${p.nombre} - $${p.precio} x ${p.cantidad} 
        <button class="cantidad-btn" onclick="modificarCantidad(${index},1)">+</button>
        <button class="cantidad-btn" onclick="modificarCantidad(${index},-1)">-</button>
        <button class="eliminar-btn" onclick="eliminarProducto(${index})">❌</button>
        </p>`;
        total += p.precio * p.cantidad;
    });
    totalHTML.innerText = total;
}

function toggleCarrito(){
    let panel=document.getElementById("carritoPanel");
    panel.style.display = (panel.style.display=="block")?"none":"block";
}

function mostrar(lista){
    let cont=document.getElementById("productos");
    cont.innerHTML="";
    lista.forEach(p=>{
        cont.innerHTML += `
        <div class="producto">
            <img src="${p.imagen}">
            <h3>${p.nombre}</h3>
            <p class="precio">$${p.precio} - ${p.info}</p>
            <button class="btn" onclick="agregar('${p.nombre}',${p.precio})">Agregar</button>
        </div>`;
    });
}

mostrar(productos);

document.getElementById("buscar").addEventListener("keyup",function(){
    let texto=this.value.toLowerCase();
    let filtrados=productos.filter(p=>p.nombre.toLowerCase().includes(texto));
    mostrar(filtrados);
});

function filtrar(cat){
    if(cat=="todos"){
        mostrar(productos);
        return;
    }
    let filtrados=productos.filter(p=>p.categoria==cat);
    mostrar(filtrados);
}

function agregar(nombre,precio){
    let cantidad=prompt("¿Cuántas unidades deseas?");
    if(cantidad==null || cantidad=="" || isNaN(cantidad)){
        alert("Cantidad inválida");
        return;
    }
    cantidad=parseInt(cantidad);
    carrito.push({nombre,precio,cantidad});
    actualizarContador();
    mostrarCarrito();
    document.getElementById("carritoPanel").style.display="block";
}

function modificarCantidad(index,delta){
    carrito[index].cantidad += delta;
    if(carrito[index].cantidad < 1) carrito[index].cantidad = 1;
    mostrarCarrito();
    actualizarContador();
}

function eliminarProducto(index){
    carrito.splice(index,1);
    mostrarCarrito();
    actualizarContador();
}

function enviarPedido(){
    if(carrito.length==0){
        alert("El carrito está vacío");
        return;
    }
    let nombre=document.getElementById("nombre").value;
    let tel=document.getElementById("telefonoCliente").value;
    let direccion=document.getElementById("direccion").value;
    let referencia=document.getElementById("referencia").value;
    let ubicacion=document.getElementById("ubicacion").value;
    if(nombre=="" || tel=="" || direccion==""){
        alert("Complete los datos del cliente");
        return;
    }
    let mensaje="PEDIDO:\n\n";
    let total=0;
    carrito.forEach(p=>{
        mensaje+=p.nombre+" x"+p.cantidad+" - $"+(p.precio*p.cantidad)+"\n";
        total += p.precio*p.cantidad;
    });
    mensaje+="\nTotal: $"+total+"\n\nDATOS DEL CLIENTE:\n";
    mensaje+="Nombre: "+nombre+"\nTeléfono: "+tel+"\nDirección: "+direccion+"\nReferencia: "+referencia+"\nUbicación: "+ubicacion;
    let url="https://wa.me/"+telefono+"?text="+encodeURIComponent(mensaje);
    window.open(url);
    carrito=[];
    actualizarContador();
    mostrarCarrito();
    document.getElementById("carritoPanel").style.display="none";
}
</script>

<a href="https://wa.me/5358103725" class="whatsapp" target="_blank">💬</a>

</body>
</html>
