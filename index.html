<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>COMPONENTES ELECTRINICOS HOLGUÍN</title>
<style>
body{
    font-family:Arial;
    margin:0;
    background:#f2f2f2;
}
header{
    text-align:center;
    position:relative;
}
.buscar{
    text-align:center;
    padding:25px;
}
.buscar input{
    width:80%;
    padding:10px;
    border:2px solid orange;
    border-radius:6px;
}
.categorias{
    text-align:center;
}
.categorias button{
    padding:10px 15px;
    margin:5px;
    border:none;
    background:#ff9800;
    color:white;
    border-radius:20px;
    cursor:pointer;
}
.productos, #seccionCarrito{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
    gap:15px;
    padding:15px;
}
.producto, .productoCarrito{
    background:white;
    border-radius:10px;
    padding:10px;
    text-align:center;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}
.producto img{
    width:100%;
    height:150px;
    object-fit:cover;
}
.precio{
    color:green;
    font-weight:bold;
}
.btn{
    background:#25D366;
    color:white;
    padding:8px;
    border-radius:6px;
    border:none;
    cursor:pointer;
    margin:2px 0;
}
.titulo{
    font-size:45px;
    color:black;
    font-weight:bold;
    margin-top:5px;
    text-shadow:2px 2px 5px white;
}
.cantidad-btn{
    padding:2px 6px;
    margin:0 3px;
    cursor:pointer;
    background:#ff9800;
    color:white;
    border:none;
    border-radius:4px;
}
.eliminar-btn{
    padding:2px 6px;
    cursor:pointer;
    background:red;
    color:white;
    border:none;
    border-radius:4px;
}
.verCarritoBtn{
    display:block;
    margin:10px auto;
    padding:10px 15px;
    background:#ff9800;
    color:white;
    border:none;
    border-radius:6px;
    cursor:pointer;
}
input{
    border-radius:6px;
    border:1px solid #ccc;
}
</style>
</head>
<body>

<header>
<img src="banner.png?v=2" style="width:100%; height:200px; object-fit:cover;">
<div style="position:absolute; top:40px; left:50%; transform:translateX(-50%); text-align:center;">
<img src="logo.png?v=2" width="120">
<h1 class="titulo">YORCH TECH</h1>
</div>
</header>

<div class="buscar">
<input id="buscar" placeholder="Buscar producto">
</div>

<div class="categorias">
<button onclick="filtrar('todos')">Todos</button>
<button onclick="filtrar('inversor')">Inversor</button>
<button onclick="filtrar('Bms')">BMS</button>
</div>

<!-- FORMULARIO -->
<div style="padding:20px;text-align:center;">
<h3>Datos del cliente</h3>
<input id="nombre" placeholder="Nombre" style="width:80%;padding:8px;margin:5px;"><br>
<input id="telefonoCliente" placeholder="Teléfono" style="width:80%;padding:8px;margin:5px;"><br>
<input id="direccion" placeholder="Dirección" style="width:80%;padding:8px;margin:5px;"><br>
<input id="referencia" placeholder="Punto de referencia" style="width:80%;padding:8px;margin:5px;"><br>
<input id="ubicacion" placeholder="Ubicación" style="width:80%;padding:8px;margin:5px;"><br>
</div>

<!-- Botón para ver carrito -->
<button class="verCarritoBtn" onclick="mostrarSeccionCarrito()">Ver carrito</button>

<!-- SECCIÓN PRINCIPAL DE PRODUCTOS -->
<div class="productos" id="productos"></div>

<!-- SECCIÓN DEL CARRITO -->
<div id="seccionCarrito" style="display:none;">
<h2>🛒 Tu carrito</h2>
<div id="listaCarrito"></div>
<p><strong>Total: $<span id="total">0</span></strong></p>
<button onclick="enviarPedido()">Finalizar pedido</button>
<button onclick="volverProductos()" style="margin-top:10px;background:#ccc;color:black;">Volver a productos</button>
</div>

<script>
let productos = [
  { nombre:"Bms 4.2v 1A", precio:200, categoria:"Bms", imagen:"https://i.imgur.com/Wk4F6QH.jpg" },
  { nombre:"Estaño 0.8mm", precio:180, categoria:"inversor", imagen:"https://i.imgur.com/8Km9tLL.jpg" }
];

let carrito=[];
let telefono="5358103725";

function mostrar(lista){
    let cont=document.getElementById("productos");
    cont.innerHTML="";
    lista.forEach((p,index)=>{
        cont.innerHTML += `
        <div class="producto">
            <img src="${p.imagen}">
            <h3>${p.nombre}</h3>
            <p class="precio">$${p.precio}</p>
            <button class="btn" onclick="agregar(${index})">Agregar</button>
        </div>`;
    });
}

mostrar(productos);

function filtrar(cat){
    if(cat=="todos"){ mostrar(productos); return; }
    let filtrados=productos.filter(p=>p.categoria==cat);
    mostrar(filtrados);
}

document.getElementById("buscar").addEventListener("keyup",function(){
    let texto=this.value.toLowerCase();
    let filtrados=productos.filter(p=>p.nombre.toLowerCase().includes(texto));
    mostrar(filtrados);
});

function agregar(index){
    let cantidad=prompt("¿Cuántas unidades deseas?");
    if(cantidad==null || cantidad=="" || isNaN(cantidad)){ alert("Cantidad inválida"); return; }
    cantidad=parseInt(cantidad);
    let prod=productos[index];
    carrito.push({nombre:prod.nombre, precio:prod.precio, cantidad:cantidad});
    alert(prod.nombre+" agregado al carrito");
}

function mostrarSeccionCarrito(){
    document.getElementById("productos").style.display="none";
    document.getElementById("seccionCarrito").style.display="grid";
    actualizarCarrito();
}

function volverProductos(){
    document.getElementById("productos").style.display="grid";
    document.getElementById("seccionCarrito").style.display="none";
}

function actualizarCarrito(){
    let lista=document.getElementById("listaCarrito");
    let totalHTML=document.getElementById("total");
    lista.innerHTML="";
    let total=0;
    carrito.forEach((p,index)=>{
        lista.innerHTML += `<p>${p.nombre} - $${p.precio} x ${p.cantidad} 
        <button class="cantidad-btn" onclick="modificarCantidad(${index},1)">+</button>
        <button class="cantidad-btn" onclick="modificarCantidad(${index},-1)">-</button>
        <button class="eliminar-btn" onclick="eliminarProducto(${index})">❌</button>
        </p>`;
        total+=p.precio*p.cantidad;
    });
    totalHTML.innerText=total;
}

function modificarCantidad(index,delta){
    carrito[index].cantidad += delta;
    if(carrito[index].cantidad < 1) carrito[index].cantidad = 1;
    actualizarCarrito();
}

function eliminarProducto(index){
    carrito.splice(index,1);
    actualizarCarrito();
}

function enviarPedido(){
    if(carrito.length==0){ alert("El carrito está vacío"); return; }
    let nombre=document.getElementById("nombre").value;
    let tel=document.getElementById("telefonoCliente").value;
    let direccion=document.getElementById("direccion").value;
    let referencia=document.getElementById("referencia").value;
    let ubicacion=document.getElementById("ubicacion").value;
    if(nombre=="" || tel=="" || direccion==""){ alert("Complete los datos del cliente"); return; }

    let mensaje="PEDIDO:\n\n";
    let total=0;
    carrito.forEach(p=>{
        mensaje+=p.nombre+" x"+p.cantidad+" - $"+(p.precio*p.cantidad)+"\n";
        total+=p.precio*p.cantidad;
    });
    mensaje+="\nTotal: $"+total+"\n\nDATOS DEL CLIENTE:\n";
    mensaje+="Nombre: "+nombre+"\nTeléfono: "+tel+"\nDirección: "+direccion+"\nReferencia: "+referencia+"\nUbicación: "+ubicacion;

    let url="https://wa.me/"+telefono+"?text="+encodeURIComponent(mensaje);
    window.open(url);

    carrito=[];
    actualizarCarrito();
    volverProductos();
}
</script>

<a href="https://wa.me/5358103725" class="whatsapp" target="_blank">💬</a>

</body>
</html>
