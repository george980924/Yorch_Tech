<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>COMPONENTES ELECTRINICOS HOLGUÍN</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f2f2f2;
}

header{
background:none;
padding:0;
text-align:center;
}

.buscar{
text-align:center;
padding:25px;
}

.buscar input{
width:80%;
padding:10px;
border:2px solid orange;
border-radius:6px;
}

.categorias{
text-align:center;
}

.categorias button{
padding:10px 15px;
margin:5px;
border:none;
background:#ff9800;
color:white;
border-radius:20px;
cursor:pointer;
}

.productos{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
gap:15px;
padding:15px;
}

.producto{
background:white;
border-radius:10px;
padding:10px;
text-align:center;
box-shadow:0 0 10px rgba(0,0,0,0.1);
transition:0.3s;
}

.producto:hover{
transform:translateY(-5px);
}

.producto img{
width:100%;
height:150px;
object-fit:cover;
}

.precio{
color:green;
font-weight:bold;
}

.btn{
background:#25D366;
color:white;
padding:8px;
border-radius:6px;
border:none;
margin-top:5px;
cursor:pointer;
}

.titulo{
font-size:45px;
color:black;
font-weight:bold;
margin-top:5px;
text-shadow:2px 2px 5px white;
}

.whatsapp{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
color:white;
font-size:28px;
width:60px;
height:60px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
text-decoration:none;
box-shadow:0 0 10px rgba(0,0,0,0.3);
z-index:1000;
}

.carrito-icono{
position:fixed;
bottom:90px;
right:20px;
background:black;
color:white;
padding:10px 15px;
border-radius:20px;
font-size:18px;
box-shadow:0 0 10px rgba(0,0,0,0.3);
z-index:1000;
}

</style>

</head>

<body>

<header style="position:relative">

<img src="banner.png?v=2" style="width:100%; height:200px; object-fit:cover;">

<div style="position:absolute; top:40px; left:50%; transform:translateX(-50%); text-align:center;">

<img src="logo.png?v=2" width="120">

<h1 class="titulo">YORCH TECH</h1>

</div>

</header>

<div class="buscar">
<input id="buscar" placeholder="Buscar producto">
</div>

<div class="categorias">
<button onclick="filtrar('todos')">Todos</button>
<button onclick="filtrar('aire')">Aire</button>
<button onclick="filtrar('inversor')">Inversor</button>
</div>

<div style="text-align:center;margin-bottom:20px;">
<button onclick="enviarPedido()" style="padding:10px 20px;background:orange;border:none;border-radius:6px;font-size:16px;">
Enviar pedido por WhatsApp
</button>
</div>

<div class="productos" id="productos"></div>

<!-- ICONO CARRITO -->
<div class="carrito-icono">
🛒 <span id="contador">0</span>
</div>

<script src="productos.js"></script>

<script>

let telefono="5358103725"
let carrito=[]

function actualizarContador(){
document.getElementById("contador").innerText=carrito.length
}

function mostrar(lista){

let cont=document.getElementById("productos")
cont.innerHTML=""

lista.forEach(p=>{

cont.innerHTML+=`
<div class="producto">
<img src="${p.imagen}">
<h3>${p.nombre}</h3>
<p class="precio">$${p.precio}</p>
<button class="btn" onclick="agregar('${p.nombre}',${p.precio})">Agregar</button>
</div>
`

})

}

mostrar(productos)

document.getElementById("buscar").addEventListener("keyup",function(){

let texto=this.value.toLowerCase()
let filtrados=productos.filter(p=>p.nombre.toLowerCase().includes(texto))
mostrar(filtrados)

})

function filtrar(cat){

if(cat=="todos"){
mostrar(productos)
return
}

let filtrados=productos.filter(p=>p.categoria==cat)
mostrar(filtrados)

}

function agregar(nombre,precio){

carrito.push({nombre,precio})
actualizarContador()
alert(nombre+" agregado al carrito")

}

function enviarPedido(){

if(carrito.length==0){
alert("El carrito está vacío")
return
}

let mensaje="Hola quiero comprar:\n"

let total=0

carrito.forEach(p=>{
mensaje+=p.nombre+" - $"+p.precio+"\n"
total+=p.precio
})

mensaje+="\nTotal: $"+total

let url="https://wa.me/"+telefono+"?text="+encodeURIComponent(mensaje)

window.open(url)

carrito=[]
actualizarContador()

}

</script>

<a href="https://wa.me/5358103725" class="whatsapp" target="_blank">
💬
</a>

</body>
</html>
